<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1720" viewBox="0 0 900 1720" style="background:#ffffff; font-family: system-ui, -apple-system, sans-serif;">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">編目全自動化工作流程</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#888">Automa 瀏覽器自動化 ｜ 97 節點 ｜ 105 條執行邊</text>

  <!-- ─── LEGEND ─── -->
  <rect x="30" y="72" width="840" height="34" rx="6" fill="#f8f8f8" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- teal -->
  <rect x="44" y="82" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="62" y="93" font-size="11" fill="#444">觸發 / 填寫</text>
  <!-- purple -->
  <rect x="144" y="82" width="14" height="14" rx="3" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="162" y="93" font-size="11" fill="#444">迴圈控制</text>
  <!-- blue -->
  <rect x="244" y="82" width="14" height="14" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="262" y="93" font-size="11" fill="#444">讀取 / 辨識</text>
  <!-- amber -->
  <rect x="344" y="82" width="14" height="14" rx="3" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="362" y="93" font-size="11" fill="#444">條件判斷</text>
  <!-- red -->
  <rect x="444" y="82" width="14" height="14" rx="3" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="462" y="93" font-size="11" fill="#444">跳過 / 錯誤路徑</text>
  <!-- green -->
  <rect x="574" y="82" width="14" height="14" rx="3" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="592" y="93" font-size="11" fill="#444">有併件路徑</text>
  <!-- gray -->
  <rect x="674" y="82" width="14" height="14" rx="3" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="692" y="93" font-size="11" fill="#444">頁面操作</text>

  <!-- ─── PHASE BANDS ─── -->
  <!-- Phase 1: 觸發 -->
  <rect x="30" y="115" width="840" height="80" rx="6" fill="#f0faf6" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="46" y="160" font-size="11" fill="#0F6E56" font-weight="600">① 觸發</text>

  <!-- Phase 2: 迴圈起點 -->
  <rect x="30" y="205" width="840" height="80" rx="6" fill="#f4f3fd" stroke="#CECBF6" stroke-width="0.5"/>
  <text x="46" y="250" font-size="11" fill="#534AB7" font-weight="600">② 迴圈起點</text>

  <!-- Phase 3: 讀取判斷 -->
  <rect x="30" y="295" width="840" height="110" rx="6" fill="#EAF1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="46" y="355" font-size="11" fill="#185FA5" font-weight="600">③ 讀取文號判斷</text>

  <!-- Phase 4: 併件處理 (tall) -->
  <rect x="30" y="415" width="840" height="360" rx="6" fill="#fffbf0" stroke="#FAC775" stroke-width="0.5"/>
  <text x="46" y="440" font-size="11" fill="#BA7517" font-weight="600">④ 併件處理</text>

  <!-- Phase 5: 本文/案由 -->
  <rect x="30" y="785" width="840" height="250" rx="6" fill="#EAF1FB" stroke="#B5D4F4" stroke-width="0.5"/>
  <text x="46" y="810" font-size="11" fill="#185FA5" font-weight="600">⑤ 本文數量 &amp; 案由登錄</text>

  <!-- Phase 6: 附件管理 -->
  <rect x="30" y="1045" width="840" height="320" rx="6" fill="#f0faf6" stroke="#9FE1CB" stroke-width="0.5"/>
  <text x="46" y="1070" font-size="11" fill="#0F6E56" font-weight="600">⑥ 附件批次管理</text>

  <!-- Phase 7: 完成迴圈 -->
  <rect x="30" y="1375" width="840" height="160" rx="6" fill="#f4f3fd" stroke="#CECBF6" stroke-width="0.5"/>
  <text x="46" y="1400" font-size="11" fill="#534AB7" font-weight="600">⑦ 完成 / 迴圈</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 1. TRIGGER -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="320" y="128" width="260" height="52" rx="26" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="150" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">自動觸發</text>
  <text x="450" y="168" text-anchor="middle" font-size="11" fill="#085041">Trigger 啟動工作流程</text>

  <line x1="450" y1="180" x2="450" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 2. LOOP START -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="300" y="216" width="300" height="52" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#26215C">迴圈開始</text>
  <text x="450" y="255" text-anchor="middle" font-size="11" fill="#3C3489">勾選第 n 筆 → 點擊「編目」</text>

  <line x1="450" y1="268" x2="450" y2="295" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 3. READ + JS PARSE -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="300" y="306" width="300" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="450" y="324" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">讀取頁面文字</text>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#0C447C">Get Text → JS 解析是否有併件文號</text>

  <line x1="450" y1="350" x2="450" y2="380" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 4. MERGE PHASE -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Condition 1: merge_nb != empty? -->
  <rect x="305" y="385" width="290" height="50" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="406" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">條件判斷①</text>
  <text x="450" y="421" text-anchor="middle" font-size="11" fill="#633806">變數 merge_nb 是否有值（有無併件文號）？</text>

  <!-- YES: has merge number → click 併件 -->
  <line x1="305" y1="410" x2="200" y2="410" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="248" y="404" text-anchor="middle" font-size="10" fill="#3B6D11" font-weight="600">有文號</text>

  <!-- LEFT BRANCH: 有併件文號路徑 -->
  <rect x="60" y="450" width="200" height="44" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1"/>
  <text x="160" y="468" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">點擊「併件」</text>
  <text x="160" y="482" text-anchor="middle" font-size="11" fill="#27500A">切換分頁 → 建立查詢元素</text>

  <line x1="200" y1="410" x2="160" y2="450" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <line x1="160" y1="494" x2="160" y2="520" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="60" y="520" width="200" height="44" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1"/>
  <text x="160" y="538" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">查詢主件</text>
  <text x="160" y="552" text-anchor="middle" font-size="11" fill="#27500A">填文號 → Scroll → 按查詢</text>

  <line x1="160" y1="564" x2="160" y2="590" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Condition 2: 判斷併件是否真實存在 -->
  <rect x="60" y="590" width="200" height="50" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="160" y="610" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">條件判斷②</text>
  <text x="160" y="625" text-anchor="middle" font-size="11" fill="#633806">HasMerge 是否存在？</text>

  <!-- YES: 併件存在 → scroll → 按確定 -->
  <line x1="60" y1="615" x2="44" y2="615" stroke="#3B6D11" stroke-width="1.2"/>
  <line x1="44" y1="615" x2="44" y2="680" stroke="#3B6D11" stroke-width="1.2"/>
  <line x1="44" y1="680" x2="60" y2="680" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="36" y="648" text-anchor="middle" font-size="10" fill="#3B6D11" font-weight="600" transform="rotate(-90,36,648)">存在</text>

  <rect x="60" y="660" width="200" height="44" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1"/>
  <text x="160" y="678" text-anchor="middle" font-size="13" font-weight="600" fill="#173404">併件存在 → 捲動確認</text>
  <text x="160" y="692" text-anchor="middle" font-size="11" fill="#27500A">Element Scroll → 按確定</text>

  <line x1="160" y1="704" x2="160" y2="730" stroke="#3B6D11" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <rect x="60" y="730" width="200" height="34" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="1"/>
  <text x="160" y="751" text-anchor="middle" font-size="12" font-weight="600" fill="#173404">→ 進入後續流程（本文/案由）</text>

  <!-- NO: 併件不存在 → JS mark → close tab → 按離開 -->
  <line x1="260" y1="615" x2="310" y2="615" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="282" y="609" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="600">不存在</text>

  <rect x="310" y="592" width="180" height="44" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="400" y="610" text-anchor="middle" font-size="13" font-weight="600" fill="#501313">JS：標記無併件</text>
  <text x="400" y="624" text-anchor="middle" font-size="11" fill="#791F1F">automaSetVariable → close tab</text>

  <line x1="400" y1="636" x2="400" y2="660" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <rect x="310" y="660" width="180" height="34" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="400" y="681" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">按「離開」→ 跳過本件</text>

  <!-- NO merge number (fallback) → 直接跳到簽核流程 -->
  <line x1="595" y1="410" x2="680" y2="410" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="634" y="404" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="600">無文號</text>

  <rect x="640" y="390" width="190" height="44" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="735" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#501313">無併件 → 直接跳過</text>
  <text x="735" y="422" text-anchor="middle" font-size="11" fill="#791F1F">→ 進入簽核流程</text>

  <!-- merge arrow join to phase 5 -->
  <!-- Arrow from 有倂件 branch join -->
  <path d="M 160 764 L 160 800 L 450 800 L 450 785" fill="none" stroke="#3B6D11" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
  <!-- Arrow from 無倂件 skip join -->
  <path d="M 735 434 L 735 800 L 450 800 L 450 785" fill="none" stroke="#E24B4A" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <!-- Arrow from 倂件不存在 fallback join -->
  <path d="M 400 694 L 400 800 L 450 800 L 450 785" fill="none" stroke="#E24B4A" stroke-width="0.8" stroke-dasharray="4 3"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 5. 簽核 + 本文 + 案由 -->
  <!-- ════════════════════════════════════════════ -->
  <line x1="450" y1="800" x2="450" y2="820" stroke="#888" stroke-width="1"/>

  <rect x="300" y="820" width="300" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="838" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">點擊「簽核流程」</text>
  <text x="450" y="852" text-anchor="middle" font-size="11" fill="#5F5E5A">切換分頁 → 等待載入</text>

  <line x1="450" y1="864" x2="450" y2="888" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="888" width="300" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="450" y="906" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">辨識本文數量</text>
  <text x="450" y="920" text-anchor="middle" font-size="11" fill="#0C447C">Get Text → JS 解析統計來文/簽/稿</text>

  <line x1="450" y1="932" x2="450" y2="956" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="956" width="300" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="974" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">登錄來文數量</text>
  <text x="450" y="988" text-anchor="middle" font-size="11" fill="#085041">Forms → 填入本文數量欄位</text>

  <line x1="450" y1="1000" x2="450" y2="1024" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="1000" width="300" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="450" y="1018" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">辨識案由</text>
  <text x="450" y="1032" text-anchor="middle" font-size="11" fill="#0C447C">Get Text → JS 處理案由文字</text>

  <!-- note overlap fix: move down -->
  <line x1="450" y1="1000" x2="450" y2="1044" stroke="#888" stroke-width="1"/>
  <rect x="300" y="1000" width="300" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="1"/>
  <text x="450" y="1018" text-anchor="middle" font-size="13" font-weight="600" fill="#042C53">辨識案由</text>
  <text x="450" y="1032" text-anchor="middle" font-size="11" fill="#0C447C">Get Text → JS 處理案由文字</text>
  <line x1="450" y1="1044" x2="450" y2="1060" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- 6. 附件管理 -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="300" y="1072" width="300" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="1090" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">填寫案由</text>
  <text x="450" y="1104" text-anchor="middle" font-size="11" fill="#085041">Forms → 自動輸入案由欄位</text>

  <line x1="450" y1="1116" x2="450" y2="1140" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="1140" width="300" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="1158" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">點擊「附件登錄」</text>
  <text x="450" y="1172" text-anchor="middle" font-size="11" fill="#5F5E5A">切換分頁 → 清除舊資料</text>

  <line x1="450" y1="1184" x2="450" y2="1208" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="1208" width="300" height="50" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="450" y="1228" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">條件判斷③</text>
  <text x="450" y="1243" text-anchor="middle" font-size="11" fill="#633806">是否有舊附件資料（hasData）？</text>

  <!-- YES: delete old -->
  <line x1="300" y1="1233" x2="230" y2="1233" stroke="#E24B4A" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="262" y="1226" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="600">有舊資料</text>
  <rect x="80" y="1212" width="148" height="44" rx="8" fill="#F7C1C1" stroke="#A32D2D" stroke-width="1"/>
  <text x="154" y="1230" text-anchor="middle" font-size="12" font-weight="600" fill="#501313">點第一列 → 刪除</text>
  <text x="154" y="1244" text-anchor="middle" font-size="11" fill="#791F1F">Handle Dialog → 確認</text>
  <path d="M 154 1256 L 154 1268 L 300 1268" fill="none" stroke="#E24B4A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-red)"/>

  <line x1="450" y1="1258" x2="450" y2="1290" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Loop data -->
  <rect x="280" y="1290" width="340" height="50" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="1"/>
  <text x="450" y="1310" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">附件迴圈 (Loop Data)</text>
  <text x="450" y="1326" text-anchor="middle" font-size="11" fill="#3C3489">遍歷 combinedList → 逐筆處理附件</text>

  <line x1="450" y1="1340" x2="450" y2="1368" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="280" y="1368" width="340" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="1388" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">新增附件資料</text>
  <text x="450" y="1403" text-anchor="middle" font-size="11" fill="#085041">點新增 → 填附件名稱 → 媒體數量</text>
  <text x="450" y="1416" text-anchor="middle" font-size="11" fill="#085041">→ 選附件型態 → Handle Dialog → 確定</text>

  <!-- Loop back arrow -->
  <path d="M 620 1396 L 750 1396 L 750 1315 L 622 1315" fill="none" stroke="#BA7517" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-amber)"/>
  <text x="762" y="1360" text-anchor="start" font-size="10" fill="#BA7517" font-weight="600">下一筆</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- 7. FINISH -->
  <!-- ════════════════════════════════════════════ -->
  <line x1="450" y1="1424" x2="450" y2="1452" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="300" y="1452" width="300" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="1470" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">截圖存檔 / 關閉分頁</text>
  <text x="450" y="1484" text-anchor="middle" font-size="11" fill="#5F5E5A">Take Screenshot → Close Tab</text>

